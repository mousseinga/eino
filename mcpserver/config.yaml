# MCP Server 配置文件

# 服务器配置
server:
  # 服务器监听地址（IP 或域名）
  host: "0.0.0.0"
  
  # 服务器监听端口
  port: 8080
  
  # 服务器名称
  server_name: "mcp-tool-server"
  
  # 服务器版本
  server_version: "1.0.0"
  
  # 是否启用 CORS
  enable_cors: true
  
  # CORS 允许的来源（支持多个）
  allowed_origins:
    - "*"

# API 密钥配置
api_keys:
  # 天气 API 密钥（OpenWeatherMap）
  # 获取方式：https://openweathermap.org/api
  weather_api_key: "04ab1814d644ac98989406e13d278e78"
  
  # Google API 密钥
  google_api_key: ""

  # 其他 API 密钥（可选）
  additional_keys: {}

