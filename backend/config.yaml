# 服务配置
host: "0.0.0.0"
port: 8888

# 数据库配置
database:
  driver: "mysql"
  dsn: "root:root@tcp(mysql:3306)/interview_agent?charset=utf8mb4&parseTime=True&loc=Local"
  max_open_conns: 100
  max_idle_conns: 10
  conn_max_lifetime: "1h"

# Redis配置
redis:
  addr: "redis:6379"
  password: "root"
  db: 0
  dial_timeout: "5s"
  read_timeout: "3s"
  write_timeout: "3s"
  pool_size: 10
  min_idle_conns: 5

# Hertz框架配置
hertz:
  log_level: "info"
  log_path: "./logs"
  read_timeout: "10s"
  write_timeout: "10s"
  idle_timeout: "60s"

# 面试系统配置
interview:
  max_duration: "30m"
  question_timeout: "10m"
  max_questions: 10
  min_questions: 5

# 安全性配置
security:
  jwt_secret: "your-jwt-secret-key-here"
  jwt_expiration: "24h"
  cors:
    allow_origins: ["*"]
    allow_methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
    allow_headers: ["Origin", "Content-Type", "Authorization"]
    expose_headers: []
    allow_credentials: true

# Google搜索工具配置
google_search:
  api_key: "your-google-api-key-here"
  search_engine_id: "your-search-engine-id-here"

# OpenAI配置
openai:
  api_key: "your-openai-api-key-here"
  model_name: "your-model-name"
  base_url: "https://api.openai.com/v1"

# Embedding 服务配置
Embedding:
  # 认证配置（APIKey 或 AccessKey/SecretKey 二选一）
  # 支持环境变量引用语法：${VAR_NAME} 或 $VAR_NAME
  APIKey: "${EMBEDDING_API_KEY}"           # 从环境变量 EMBEDDING_API_KEY 读取
  # AccessKey: "${EMBEDDING_ACCESS_KEY}"   # 从环境变量 EMBEDDING_ACCESS_KEY 读取
  # SecretKey: "${EMBEDDING_SECRET_KEY}"   # 从环境变量 EMBEDDING_SECRET_KEY 读取

  # 服务配置
  Model: "${EMBEDDING_MODEL}"              # Ark 平台的端点 ID，从环境变量读取
  BaseURL: "${EMBEDDING_BASE_URL}"         # API 基础 URL，从环境变量读取
  Region: "${EMBEDDING_REGION}"            # 服务区域，从环境变量读取

  # 高级配置
  Timeout: 30s      # 请求超时时间
  RetryTimes: 3     # 重试次数
  Dimensions: 2560  # 输出向量维度（修改为实际模型输出维度）
  User: ""          # 用户标识（可选）

# Milvus 向量数据库配置
