# 文档分割器配置
DocumentSplitter:
  ChunkSize: 1000                      # 目标片段大小（字符数）
  OverlapSize: 200                     # 片段重叠大小（字符数）
  Separators:                          # 分隔符列表（按优先级排序）
    - "\n\n"                           # 双换行（段落）
    - "\n"                             # 单换行
    - "。"                             # 中文句号
    - "！"                             # 中文感叹号
    - "？"                             # 中文问号
    - ". "                             # 英文句号
    - "! "                             # 英文感叹号
    - "? "                             # 英文问号
  KeepType: 0                          # 分隔符保留策略: 0=不保留, 1=保留在开头, 2=保留在结尾

# 微信配置
wechat:
  app_id: appid
  app_secret: appsecret
  redirect_url: "http://localhost:8888/api/v1/user/wechat/callback"

# 飞书配置
feishu:
  webhook_url: ""
  enabled: false

